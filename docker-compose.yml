version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: campusloop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-campusloop}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-campusloop_secret}
      POSTGRES_DB: ${DB_NAME:-campusloop}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-campusloop}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusloop-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
